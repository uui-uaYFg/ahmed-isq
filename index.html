<head>

<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --purple-dark: #2d0045;
    --purple-mid: #6b21a8;
    --purple-bright: #a855f7;
    --purple-glow: #c084fc;
    --purple-lightning: #d8b4fe;
    --light: #f0e6ff;
  }
  html, body {
    width: 100%; height: 100%;
    background: #0a0010;
    font-family: 'Tajawal', sans-serif;
    overflow-x: hidden;
    cursor: crosshair;
  }
  .bg-image {
    position: fixed; inset: 0; z-index: 0;
    background-image: url('IMG_2326.jpeg');
    background-size: cover;
    background-position: center center;
  }
  .bg-overlay {
    position: fixed; inset: 0; z-index: 1;
    background: linear-gradient(180deg,
      rgba(10,0,20,0.5) 0%, rgba(10,0,20,0.25) 30%,
      rgba(10,0,20,0.5) 70%, rgba(10,0,20,0.88) 100%);
  }
  .bg-texture {
    position: fixed; inset: 0; z-index: 2;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
    pointer-events: none;
  }
  .top-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 3; height: 3px;
    background: linear-gradient(90deg, transparent 0%, #6b21a8 20%, #c084fc 50%, #6b21a8 80%, transparent 100%);
    box-shadow: 0 0 20px rgba(168,85,247,0.8), 0 0 60px rgba(168,85,247,0.3);
  }
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 3; height: 2px;
    background: linear-gradient(90deg, transparent 0%, #6b21a8 30%, #a855f7 50%, #6b21a8 70%, transparent 100%);
    box-shadow: 0 0 15px rgba(168,85,247,0.6);
  }
  .container {
    position: relative; z-index: 10;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 20px 50px;
  }
  .guts-wrap {
    position: relative; width: 140px; height: 140px;
    margin-bottom: 20px; flex-shrink: 0;
  }
  .guts-glow {
    position: absolute; inset: -14px; border-radius: 50%;
    background: radial-gradient(circle, rgba(168,85,247,0.3) 0%, transparent 70%);
    animation: glow-pulse 3s ease-in-out infinite;
  }
  @keyframes glow-pulse {
    0%,100% { opacity:0.6; transform:scale(1); }
    50% { opacity:1; transform:scale(1.08); }
  }
  .guts-ring {
    position: absolute; inset: -5px; border-radius: 50%;
    background: conic-gradient(from 0deg, transparent 0%, #6b21a8 20%, #c084fc 50%, #6b21a8 80%, transparent 100%);
    animation: spin 5s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .guts-ring-inner {
    position: absolute; inset: 2px; border-radius: 50%;
    background: #0a0010;
  }
  .guts-img {
    position: absolute; inset: 5px;
    width: calc(100% - 10px); height: calc(100% - 10px);
    border-radius: 50%;
    object-fit: cover; object-position: center 10%;
    background: #0a0010;
  }
  .name-main {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(28px, 7.5vw, 56px); font-weight: 900;
    letter-spacing: 6px; line-height: 1.2;
    text-align: center;
    background: linear-gradient(135deg, #ffffff 0%, #c084fc 25%, #1a0030 50%, #a855f7 70%, #ffffff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 12px rgba(192,132,252,0.9)) drop-shadow(0 0 30px rgba(168,85,247,0.6));
    animation: flicker 10s ease-in-out infinite, shimmer 4s linear infinite;
    background-size: 200% auto;
    margin-bottom: 6px;
  }
  @keyframes shimmer {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }
  .name-pipe { opacity: 0.8; margin: 0 10px; }
  .name-isq { }
  @keyframes flicker {
    0%,92%,100%{opacity:1} 93%{opacity:0.75} 94%{opacity:1} 96%{opacity:0.6} 97%{opacity:1}
  }
  .quote {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 4px;
    text-align: center;
    margin-top: 4px;
    margin-bottom: 22px;
    background: linear-gradient(90deg, #ffffff 20%, #c084fc 60%, #1a0030 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 6px rgba(192,132,252,0.5));
  }
  .divider {
    width: 280px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--purple-mid), var(--purple-lightning), var(--purple-mid), transparent);
    margin: 0 auto 22px; box-shadow: 0 0 8px rgba(168,85,247,0.4); position: relative;
  }
  .divider::before,.divider::after {
    content:'✦'; position:absolute; top:50%; transform:translateY(-50%);
    color:var(--purple-lightning); font-size:9px; opacity:0.6;
  }
  .divider::before{left:20px} .divider::after{right:20px}
  .links-stack { display:flex; flex-direction:column; gap:10px; width:100%; max-width:320px; }
  .link-card {
    position:relative; display:flex; align-items:center; gap:14px;
    padding:13px 20px; background:rgba(15,0,30,0.6); border:1px solid rgba(107,33,168,0.3);
    text-decoration:none; color:var(--light); font-size:14px; font-weight:700; letter-spacing:1px;
    transition:all 0.3s ease; overflow:hidden; backdrop-filter:blur(12px);
    cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent; direction:ltr;
  }
  .link-card::after {
    content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg,transparent,var(--purple-bright),transparent);
    transform:scaleX(0); transition:transform 0.3s ease;
  }
  .link-card:hover,.link-card:active {
    border-color:var(--purple-mid); background:rgba(30,0,55,0.85);
    box-shadow:0 0 22px rgba(107,33,168,0.4); transform:translateX(-3px); color:#fff;
  }
  .link-card:hover::after,.link-card:active::after{transform:scaleX(1)}
  .link-card:active{transform:scale(0.97)}
  .icon-box {
    width:36px; height:36px; display:flex; align-items:center; justify-content:center;
    background:rgba(107,33,168,0.25); border:1px solid rgba(168,85,247,0.3);
    border-radius:8px; flex-shrink:0;
  }
  .icon-box svg{width:20px;height:20px;fill:var(--purple-glow);filter:drop-shadow(0 0 4px rgba(192,132,252,0.6))}
  .link-text{display:flex;flex-direction:column;gap:1px;text-align:left}
  .link-name{font-size:14px;font-weight:700;color:var(--light)}
  .link-handle{font-size:11px;color:rgba(192,132,252,0.6);font-weight:300;letter-spacing:1px}
  .link-arrow{margin-right:auto;color:rgba(168,85,247,0.4);font-size:14px;transition:transform 0.3s,color 0.3s}
  .link-card:hover .link-arrow{transform:translateX(3px);color:var(--purple-bright)}
  .corner{position:fixed;width:48px;height:48px;opacity:0.18;z-index:5}
  .corner svg{width:100%;height:100%}
  .corner.tl{top:10px;left:10px}.corner.tr{top:10px;right:10px;transform:scaleX(-1)}
  .corner.bl{bottom:10px;left:10px;transform:scaleY(-1)}.corner.br{bottom:10px;right:10px;transform:scale(-1)}
  .sparks{position:fixed;inset:0;z-index:4;pointer-events:none}
  .spark{position:absolute;width:2px;height:2px;background:var(--purple-lightning);border-radius:50%;animation:rise linear infinite;opacity:0}
  @keyframes rise{
    0%{transform:translateY(0) translateX(0);opacity:0}10%{opacity:0.8}90%{opacity:0.2}
    100%{transform:translateY(-120vh) translateX(var(--drift));opacity:0}
  }
  .anim{animation:entrance 0.8s ease both}
  .d1{animation-delay:.05s}.d2{animation-delay:.2s}.d3{animation-delay:.32s}.d4{animation-delay:.42s}
  .d5{animation-delay:.52s}.d6{animation-delay:.62s}.d7{animation-delay:.72s}.d8{animation-delay:.82s}
  @keyframes entrance{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .toast{
    position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);
    background:rgba(107,33,168,0.92);color:#fff;padding:10px 24px;
    font-family:'Tajawal',sans-serif;font-size:13px;letter-spacing:2px;
    border:1px solid var(--purple-bright);box-shadow:0 0 20px rgba(168,85,247,0.5);
    opacity:0;transition:all 0.3s ease;pointer-events:none;z-index:999;white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
